<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lost in the Multiverse · Punjabi Ji</title>
    <link rel="icon" type="image/png" href="/images/logo.png">
    <style>
      :root {
        --orange: #ff7a18;
        --orange-deep: #ff5722;
        --blue: #0a2e73;
        --ink: #0f172a;
        --paper: #fff7ec;
      }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: "Comic Sans MS", "Bangers", system-ui, sans-serif;
        background:
          radial-gradient(circle at 15% 18%, rgba(255, 122, 24, 0.18), transparent 44%),
          radial-gradient(circle at 85% 14%, rgba(110, 200, 255, 0.18), transparent 46%),
          linear-gradient(165deg, #f4f9ff 0%, #e9f3ff 46%, #dce9ff 100%);
        color: var(--ink);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        background: var(--paper);
        max-width: 460px;
        width: 100%;
        padding: 28px 24px;
        border-radius: 22px;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45), inset 0 -4px 0 rgba(0, 0, 0, 0.08);
      }
      .logo {
        width: 96px;
        height: 96px;
        border-radius: 20px;
        margin: 0 auto 12px;
        display: block;
      }
      h1 {
        font-size: 64px;
        margin: 4px 0;
        color: var(--orange-deep);
        text-shadow: 2px 2px 0 var(--blue);
        letter-spacing: 2px;
      }
      h2 { margin: 0 0 6px; color: var(--blue); font-size: 22px; }
      .pa { display: block; color: #c2410c; margin-top: 4px; font-size: 18px; }
      p { color: #334155; line-height: 1.45; margin: 14px 0 22px; }
      a.btn {
        display: inline-block;
        background: linear-gradient(180deg, var(--orange), var(--orange-deep));
        color: #fff;
        text-decoration: none;
        padding: 14px 28px;
        border-radius: 999px;
        font-weight: bold;
        font-size: 18px;
        letter-spacing: 1px;
        box-shadow: 0 8px 20px rgba(255, 87, 34, 0.45), inset 0 -3px 0 rgba(0, 0, 0, 0.2);
      }
      a.btn:hover { transform: translateY(-2px); }
    </style>
  </head>
  <body>
    <main class="card" role="main">
      <img class="logo" src="/images/logo.png" alt="Punjabi Ji logo">
      <h1>404</h1>
      <h2>
        Lost in the Multiverse!
        <span class="pa" lang="pa">ਰਾਹ ਭੁੱਲ ਗਿਆ!</span>
      </h2>
      <p>
        That page doesn’t exist. Let’s go back home and keep training.<br>
        <span class="pa" lang="pa">ਘਰ ਵਾਪਸ ਚੱਲੀਏ ਤੇ ਫੇਰ ਸਿੱਖੀਏ।</span>
      </p>
      <a class="btn" href="/">⚔️ Back to the Game</a>
    </main>
  </body>
</html>
