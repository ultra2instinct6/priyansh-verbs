  /* Inline critical splash styles — self-contained, do NOT depend on styles.css. */
  #splash{
    position:fixed;inset:0;z-index:9999;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:22px;padding:32px 20px max(64px, env(safe-area-inset-bottom));
    background:

      linear-gradient(165deg,#0a2e73 0%, #0f5fd7 100%);
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    transition:opacity .45s ease;
    opacity:1;
  }
  #splash.hide{opacity:0;pointer-events:none;}
  #splash.gone{display:none !important;}
  #splash .splash-logo{
    max-width:min(70vw,420px);max-height:55vh;width:auto;height:auto;
    filter:drop-shadow(0 12px 28px rgba(0,0,0,.35));
  }
  #splash .splash-cta{
    display:flex;flex-direction:column;align-items:center;gap:2px;
    padding:14px 28px;border-radius:999px;
    background:linear-gradient(180deg,#ff7a18 0%,#ff5722 100%);
    color:#fff;font-family:"Fredoka","Trebuchet MS",sans-serif;font-weight:700;
    font-size:1.2rem;letter-spacing:.5px;
    box-shadow:0 8px 24px rgba(255,87,34,.45),inset 0 -3px 0 rgba(0,0,0,.2),inset 0 2px 0 rgba(255,255,255,.25);
    animation:splashPulse 1.6s ease-in-out infinite;
    pointer-events:none; /* clicks pass through to #splash */
  }
  #splash .splash-cta .splash-cta-pa{font-size:.85em;font-weight:600;opacity:.95;font-family:"Noto Sans Gurmukhi",sans-serif;}
  #splash .splash-credit{

  @keyframes splashPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}

  <script>
    // Splash screen: shows until the user taps/clicks/presses a key. No auto-timer.
    (function () {
      var splash = document.getElementById("splash");
      if (!splash) return;
      var FADE_MS = 500;
      var dismissed = false;
      function dismiss() {
        if (dismissed) return;
        dismissed = true;
        // iOS Safari: AudioContext must be created inside a user gesture.
        try {
          if (window.GameAPI && window.GameAPI.SFX) {
            window.GameAPI.SFX.unlock && window.GameAPI.SFX.unlock();
            window.GameAPI.SFX.welcome && window.GameAPI.SFX.welcome();
          }
          if (window.GameAPI && window.GameAPI.BGM) {
            setTimeout(function () { window.GameAPI.BGM.start(); }, 900);
          }
        } catch (_) {}
        // Belt-and-suspenders: class + inline style, then guaranteed removal.
        splash.classList.add("hide");
        splash.style.opacity = "0";
        splash.style.pointerEvents = "none";
        function gone() {
          // Move focus off the splash before hiding it from a11y, otherwise
          // Chrome warns: "Blocked aria-hidden on an element because its
          // descendant retained focus." Using inert also prevents focus and
          // is the modern replacement for aria-hidden on hidden containers.
          try {
            if (splash.contains(document.activeElement)) {
              document.activeElement.blur();
            }
          } catch (_) {}
          splash.classList.add("gone");
          splash.style.display = "none";
          splash.removeAttribute("aria-hidden");
          splash.setAttribute("inert", "");
        }
        setTimeout(gone, FADE_MS);
      }
      // pointerdown fires earliest on both touch and mouse; click/touchstart/keydown as fallbacks.
      splash.addEventListener("pointerdown", dismiss);
      splash.addEventListener("click", dismiss);
      splash.addEventListener("touchstart", dismiss, { passive: true });
      splash.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); dismiss(); }
      });
      // Window-level safety net: if anything overlays #splash, taps still dismiss.
      window.addEventListener("keydown", function (e) {
        if (!dismissed && (e.key === "Enter" || e.key === " ")) dismiss();
      });
      // Ensure splash doesn't get stuck if focus/visibility flips during load.
      document.addEventListener("visibilitychange", function () {
        if (!document.hidden && splash.classList.contains("hide") && !splash.classList.contains("gone")) {
          splash.classList.add("gone"); splash.style.display = "none";
        }
      });
    })();
  </script>
  <script>
    // Register service worker for offline play + faster repeat loads.
    // Auto-reload once when a new SW takes control so users immediately get
    // the new CSS/JS instead of running an old cached shell.
    if ("serviceWorker" in navigator) {
      let _swReloaded = false;
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (_swReloaded) return;
        _swReloaded = true;
        window.location.reload();
      });
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch((e) =>
          console.warn("[SW] register failed:", e.message)
        );
      });
    }
  </script>
