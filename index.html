      </span>
    </div>
  </header>

    </div>
    <div class="hud-progress" id="ladder-progress">Step 1 / 1 <span class="pa pa-inline" lang="pa">· ਕਦਮ 1 / 1</span></div>
    <div class="hud-progress">₹ <span id="rupees">0</span> · 🟨 <span id="gold-bars">0</span> · � <span id="silver-coins">0</span></div>
    <div class="hud-actions">
      <button class="hud-btn" id="sound-btn" title="Sound FX · ਆਵਾਜ਼">🔊</button>

      <button class="hud-btn" id="map-btn" title="Map · ਨਕਸ਼ਾ">🗺️</button>

  <script type="module" src="online.js"></script>
  <script>
    // Splash screen: shows until the user taps/clicks/presses a key. No auto-timer.
    (function () {
      var splash = document.getElementById("splash");
      if (!splash) return;
      var FADE_MS = 700;
      var dismissed = false;
      function dismiss() {
        if (dismissed) return;
        dismissed = true;
        // iOS Safari: AudioContext must be created inside a user gesture.
        // Pre-warm the SoundKit and play the bhangra welcome sting.
        try {
          if (window.GameAPI && window.GameAPI.SFX) {
            window.GameAPI.SFX.unlock && window.GameAPI.SFX.unlock();
            window.GameAPI.SFX.welcome && window.GameAPI.SFX.welcome();
          }
          // Kick off the bhangra-chiptune background loop after the welcome sting.
          if (window.GameAPI && window.GameAPI.BGM) {
            setTimeout(function () { window.GameAPI.BGM.start(); }, 900);
          }
        } catch (_) {}
        splash.classList.add("hide");
        var done = false;
        function gone() {
          if (done) return;
          done = true;
          splash.classList.add("gone");
          splash.setAttribute("aria-hidden", "true");
        }
        splash.addEventListener("transitionend", gone, { once: true });
        setTimeout(gone, FADE_MS);
      }
      splash.addEventListener("click", dismiss);
      splash.addEventListener("touchstart", dismiss, { passive: true });
      splash.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); dismiss(); }
      });
    })();
  </script>
  <script>
    // Register service worker for offline play + faster repeat loads.
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch((e) =>
          console.warn("[SW] register failed:", e.message)
        );
      });
    }
  </script>
